<div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-8">
  <div class="card">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide" x-text="t('statPairs')"></p>
        <p class="text-3xl font-bold text-slate-800 mt-1" x-text="pairs.length"></p>
      </div>
      <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center">
        <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide" x-text="t('statDest')"></p>
        <p class="text-3xl font-bold text-slate-800 mt-1" x-text="totalDestinations()"></p>
      </div>
      <div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center">
        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
    </div>
  </div>

</div>

<div class="card">
  <h2 class="text-sm font-bold text-slate-700 mb-4" x-text="t('pairsOverview')"></h2>
  <div x-show="pairs.length === 0" class="text-center py-8 text-slate-400 text-sm">
    <span x-text="t('noPairsShort')"></span>
    <button @click="view='pairs'; openAddPair()" class="text-indigo-600 font-medium hover:underline ml-1" x-text="t('addFirstPairLink')"></button>
  </div>
  <div class="space-y-3">
    <template x-for="pair in pairs" :key="pair.Name">
      <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-xl">
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-slate-800 text-sm" x-text="pair.Name"></p>
          <p class="text-xs text-slate-400 mt-0.5" x-text="pair.Source.Username + ' @ ' + pair.Source.Host"></p>
        </div>
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
          </svg>
          <span class="badge badge-indigo" x-text="pair.Destinations.length + ' ' + t('destSuffix')"></span>
        </div>
      </div>
    </template>
  </div>
</div>
