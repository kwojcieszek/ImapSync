<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

  <!-- General settings -->
  <div class="card">
    <h2 class="text-sm font-bold text-slate-700 mb-5 flex items-center gap-2">
      <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span x-text="t('generalSettings')"></span>
    </h2>
    <div class="space-y-4">
      <div>
        <label class="label" x-text="t('stateFile')"></label>
        <input x-model="generalSettings.StateFilePath" type="text" class="input" />
      </div>
      <button @click="saveSettings()" class="btn-primary w-full justify-center mt-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span x-text="t('saveSettings')"></span>
      </button>
    </div>
  </div>

  <!-- SMTP -->
  <div class="card">
    <h2 class="text-sm font-bold text-slate-700 mb-5 flex items-center gap-2">
      <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
      <span x-text="t('smtpCard')"></span>
    </h2>
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label" x-text="t('smtpHost')"></label>
          <input x-model="smtpSettings.Host" type="text" placeholder="smtp.example.com" class="input" />
        </div>
        <div>
          <label class="label" x-text="t('port')"></label>
          <input x-model.number="smtpSettings.Port" type="number" class="input" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label" x-text="t('loginLabel')"></label>
          <input x-model="smtpSettings.Username" type="text" class="input" />
        </div>
        <div>
          <label class="label" x-text="t('passwordLabel')"></label>
          <input x-model="smtpSettings.Password" type="password" class="input" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label" x-text="t('smtpFrom')"></label>
          <input x-model="smtpSettings.From" type="email" class="input" />
        </div>
        <div>
          <label class="label" x-text="t('smtpTo')"></label>
          <input x-model="smtpSettings.To" type="email" class="input" />
        </div>
      </div>
      <div class="flex items-center gap-2">
        <input x-model="smtpSettings.UseSsl" type="checkbox" id="ssl" class="w-4 h-4 rounded accent-indigo-600" />
        <label for="ssl" class="text-sm text-slate-600" x-text="t('useSsl')"></label>
      </div>
      <button @click="saveSMTP()" class="btn-primary w-full justify-center mt-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span x-text="t('saveSMTP')"></span>
      </button>
    </div>
  </div>

</div>
