<div x-show="pairModal.open"
  class="fixed inset-0 z-40 flex items-start justify-center bg-black/40 backdrop-blur-sm overflow-y-auto py-8"
  @click.self="pairModal.open = false">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4" @click.stop>

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100">
      <h2 class="text-base font-bold text-slate-800" x-text="pairModal.isEdit ? t('editPairTitle') : t('addPairTitle')"></h2>
      <button @click="pairModal.open = false" class="text-slate-400 hover:text-slate-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="px-6 py-5 space-y-6">

      <!-- Pair name + interval -->
      <div class="grid grid-cols-3 gap-3">
        <div class="col-span-2">
          <label class="label" x-text="t('pairName')"></label>
          <input x-model="pairModal.form.Name" type="text" :placeholder="t('pairNamePlaceholder')" class="input" />
        </div>
        <div>
          <label class="label" x-text="t('pairInterval')"></label>
          <input x-model.number="pairModal.form.IntervalMinutes" type="number" min="1"
            placeholder="5" class="input" required />
        </div>
      </div>

      <!-- Source mailbox -->
      <div class="bg-slate-50 rounded-2xl p-5">
        <p class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-4" x-text="t('sourceMailbox')"></p>
        <div class="space-y-3">
          <div class="grid grid-cols-3 gap-3">
            <div class="col-span-2">
              <label class="label" x-text="t('imapHost')"></label>
              <input x-model="pairModal.form.Source.Host" type="text" placeholder="imap.example.com" class="input" />
            </div>
            <div>
              <label class="label" x-text="t('port')"></label>
              <input x-model.number="pairModal.form.Source.Port" type="number" class="input" />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="label" x-text="t('loginLabel')"></label>
              <input x-model="pairModal.form.Source.Username" type="text" class="input" />
            </div>
            <div>
              <label class="label" x-text="t('passwordLabel')"></label>
              <input x-model="pairModal.form.Source.Password" type="password" class="input" />
            </div>
          </div>
          <div class="flex items-center gap-2">
            <input x-model="pairModal.form.Source.UseSsl" type="checkbox" id="src-ssl" class="w-4 h-4 rounded accent-indigo-600" />
            <label for="src-ssl" class="text-sm text-slate-600">SSL</label>
          </div>
        </div>
      </div>

      <!-- Destination mailboxes -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <p class="text-xs font-bold text-slate-500 uppercase tracking-wide" x-text="t('destMailboxes')"></p>
          <button @click="addDestination()" class="btn-secondary btn-sm text-xs">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            <span x-text="t('addDest')"></span>
          </button>
        </div>
        <div class="space-y-3">
          <template x-for="(dest, i) in pairModal.form.Destinations" :key="i">
            <div class="bg-slate-50 rounded-2xl p-4 relative">
              <button x-show="pairModal.form.Destinations.length > 1" @click="removeDestination(i)"
                class="absolute top-3 right-3 text-slate-400 hover:text-red-500 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
              <p class="text-xs font-semibold text-slate-400 mb-3" x-text="t('destLabel') + ' ' + (i + 1)"></p>
              <div class="space-y-3">
                <div class="grid grid-cols-3 gap-3">
                  <div class="col-span-2">
                    <label class="label" x-text="t('imapHost')"></label>
                    <input x-model="dest.Host" type="text" placeholder="imap.example.com" class="input" />
                  </div>
                  <div>
                    <label class="label" x-text="t('port')"></label>
                    <input x-model.number="dest.Port" type="number" class="input" />
                  </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="label" x-text="t('loginLabel')"></label>
                    <input x-model="dest.Username" type="text" class="input" />
                  </div>
                  <div>
                    <label class="label" x-text="t('passwordLabel')"></label>
                    <input x-model="dest.Password" type="password" class="input" />
                  </div>
                </div>
                <div class="flex items-center gap-2">
                  <input x-model="dest.UseSsl" type="checkbox" :id="'dest-ssl-' + i" class="w-4 h-4 rounded accent-indigo-600" />
                  <label :for="'dest-ssl-' + i" class="text-sm text-slate-600">SSL</label>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <p x-show="pairModal.error" x-text="pairModal.error" class="text-sm text-red-600 bg-red-50 px-4 py-2 rounded-xl"></p>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-100">
      <button @click="pairModal.open = false" class="btn-secondary" x-text="t('cancel')"></button>
      <button @click="savePair()" :disabled="pairModal.saving" class="btn-primary">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span x-show="!pairModal.saving" x-text="pairModal.isEdit ? t('saveChanges') : t('addPairSave')"></span>
        <span x-show="pairModal.saving" x-text="t('saving')"></span>
      </button>
    </div>

  </div>
</div>
