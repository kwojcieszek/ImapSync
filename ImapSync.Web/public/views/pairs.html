<div class="card">
  <div x-show="pairs.length === 0" class="text-center py-16">
    <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
      </svg>
    </div>
    <p class="text-slate-500 text-sm" x-text="t('noPairsLong')"></p>
    <button @click="openAddPair()" class="btn-primary mt-4" x-text="t('addFirstPairBtn')"></button>
  </div>

  <div x-show="pairs.length > 0" class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-slate-100">
          <th class="text-left py-3 px-2 text-xs font-semibold text-slate-400 uppercase tracking-wide" x-text="t('colPairName')"></th>
          <th class="text-left py-3 px-2 text-xs font-semibold text-slate-400 uppercase tracking-wide" x-text="t('colSource')"></th>
          <th class="text-left py-3 px-2 text-xs font-semibold text-slate-400 uppercase tracking-wide" x-text="t('colDest')"></th>
          <th class="text-left py-3 px-2 text-xs font-semibold text-slate-400 uppercase tracking-wide" x-text="t('colDestCount')"></th>
          <th class="py-3 px-2"></th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-50">
        <template x-for="pair in pairs" :key="pair.Name">
          <tr class="hover:bg-slate-50 transition-colors">
            <td class="py-3 px-2">
              <p class="font-semibold text-slate-800" x-text="pair.Name"></p>
            </td>
            <td class="py-3 px-2">
              <p class="text-slate-700" x-text="pair.Source.Username"></p>
              <p class="text-xs text-slate-400" x-text="pair.Source.Host + ':' + pair.Source.Port"></p>
            </td>
            <td class="py-3 px-2">
              <div class="space-y-1">
                <template x-for="(d, i) in pair.Destinations" :key="i">
                  <div>
                    <p class="text-slate-700" x-text="d.Username"></p>
                    <p class="text-xs text-slate-400" x-text="d.Host + ':' + d.Port"></p>
                  </div>
                </template>
              </div>
            </td>
            <td class="py-3 px-2">
              <span class="badge badge-indigo" x-text="pair.Destinations.length"></span>
            </td>
            <td class="py-3 px-2">
              <div class="flex items-center gap-2 justify-end">
                <button @click="openEditPair(pair)" class="btn-secondary btn-sm">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                  </svg>
                  <span x-text="t('editBtn')"></span>
                </button>
                <button @click="deletePair(pair.Name)" class="btn-danger btn-sm">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                  <span x-text="t('deleteBtn')"></span>
                </button>
              </div>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>
