<!DOCTYPE html>
<html :lang="lang" x-data="app()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImapSync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">

<!-- TOAST -->
<div x-cloak x-show="toast.visible" x-transition
  class="fixed top-5 right-5 z-50 flex items-center gap-3 px-5 py-3 rounded-2xl shadow-xl text-sm font-medium"
  :class="toast.type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'">
  <span x-text="toast.message"></span>
</div>

<!-- LOGIN — visible when not authenticated -->
<div x-show="!user" id="view-login"></div>

<!-- APP SHELL — visible when authenticated -->
<div x-cloak x-show="user" class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-900 flex flex-col flex-shrink-0">
    <div class="px-6 py-5 border-b border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <div>
          <p class="text-white font-bold text-sm">ImapSync</p>
          <p class="text-slate-500 text-xs" x-text="t('appSubtitle')"></p>
        </div>
      </div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1 text-white">
      <button @click="view = 'dashboard'" class="w-full sidebar-item" :class="view === 'dashboard' && 'active'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5a2 2 0 012-2h4a2 2 0 012 2v2H8V5z"/>
        </svg>
        <span x-text="t('navDashboard')"></span>
      </button>
      <button @click="view = 'pairs'; loadPairs()" class="w-full sidebar-item" :class="view === 'pairs' && 'active'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/>
        </svg>
        <span x-text="t('navPairs')"></span>
        <span x-show="pairs.length > 0" class="ml-auto bg-indigo-500/30 text-indigo-300 text-xs px-2 py-0.5 rounded-full" x-text="pairs.length"></span>
      </button>
      <button @click="view = 'settings'; loadSettings()" class="w-full sidebar-item" :class="view === 'settings' && 'active'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span x-text="t('navSettings')"></span>
      </button>
      <button @click="view = 'system'" class="w-full sidebar-item" :class="view === 'system' && 'active'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        <span x-text="t('navSystem')"></span>
      </button>
      <button @click="view = 'log'" class="w-full sidebar-item" :class="view === 'log' && 'active'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h10M4 18h6"/>
        </svg>
        <span x-text="t('navLog')"></span>
      </button>
    </nav>

    <div class="px-3 py-4 border-t border-slate-800">
      <div class="flex items-center gap-3 px-4 py-3">
        <div class="w-8 h-8 bg-indigo-600/30 rounded-full flex items-center justify-center">
          <span class="text-indigo-300 text-xs font-bold" x-text="(user?.displayName || user?.username || '?')[0].toUpperCase()"></span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-white text-sm font-medium truncate" x-text="user?.displayName || user?.username"></p>
          <p class="text-slate-500 text-xs" x-text="user?.role"></p>
        </div>
        <button @click="logout()" :title="t('logoutTitle')" class="text-slate-500 hover:text-red-400 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-100 px-8 py-4 flex items-center justify-between shadow-sm flex-shrink-0">
      <div>
        <h1 class="text-lg font-bold text-slate-800" x-text="viewTitle()"></h1>
        <p class="text-sm text-slate-400" x-text="viewSubtitle()"></p>
      </div>
      <div class="flex items-center gap-3">
        <select x-model="lang" @change="saveLang()" class="lang-select">
          <option value="en">🇬🇧 EN</option>
          <option value="pl">🇵🇱 PL</option>
          <option value="de">🇩🇪 DE</option>
          <option value="fr">🇫🇷 FR</option>
          <option value="es">🇪🇸 ES</option>
        </select>
        <button x-show="view === 'pairs'" @click="openAddPair()" class="btn-primary">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          <span x-text="t('addPair')"></span>
        </button>
      </div>
    </header>

    <!-- VIEW CONTAINERS — content injected from views/*.html -->
    <main class="flex-1 overflow-y-auto px-8 py-6">
      <div id="view-dashboard" x-show="view === 'dashboard'"></div>
      <div id="view-pairs"     x-show="view === 'pairs'"></div>
      <div id="view-settings"  x-show="view === 'settings'"></div>
      <div id="view-system"    x-show="view === 'system'"></div>
      <div id="view-log"       x-show="view === 'log'"></div>
    </main>

  </div>
</div>

<!-- MODAL — content injected from views/modal-pair.html -->
<div id="view-modal-pair"></div>

</body>
</html>
